<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Clasament Driveri</title></head>
<body>
<div layout:fragment="content">
    <h2>Campionatul Driverilor</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nume</th>
                    <th>Echipa</th>
                    <th>Puncte</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="driver, stat : ${drivers}"
                    th:classappend="${stat.index == 0 ? 'table-warning' : (stat.index == 1 ? 'table-secondary' : (stat.index == 2 ? 'table-danger' : ''))}">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${driver.nume}"></td>
                    <td th:text="${driver.team.nume}"></td>
                    <td class="fw-bold" th:text="${driver.nrPuncte}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
