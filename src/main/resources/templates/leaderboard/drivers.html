<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Clasament Driveri</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Campionatul Driverilor</h2>
        <form th:action="@{/leaderboard/drivers}" method="get" class="d-flex align-items-center gap-2 mb-0">
            <label class="text-muted small mb-0">Sezon:</label>
            <select name="season" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:auto" onchange="this.form.submit()">
                <option value="0" th:selected="${selectedSeason == 0}">Toate</option>
                <option th:each="y : ${seasons}" th:value="${y}" th:text="${y}" th:selected="${selectedSeason == y}"></option>
            </select>
        </form>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nume</th>
                    <th>Echipa</th>
                    <th>Puncte</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="driver, stat : ${drivers}"
                    th:classappend="${stat.index == 0 ? 'table-warning' : (stat.index == 1 ? 'table-secondary' : (stat.index == 2 ? 'table-danger' : ''))}">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${driver.nume}"></td>
                    <td th:text="${driver.team.nume}"></td>
                    <td class="fw-bold" th:text="${driver.nrPuncte}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
