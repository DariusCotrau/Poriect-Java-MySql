<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Editare Driver</title></head>
<body>
<div layout:fragment="content">
    <h2 th:text="${driver.id != null ? 'Editare Driver' : 'Driver Nou'}"></h2>

    <div class="card bg-secondary text-light">
        <div class="card-body">
            <form th:action="${driver.id != null ? '/drivers/' + driver.id : '/drivers'}" method="post">
                <div class="mb-3">
                    <label for="nume" class="form-label">Nume</label>
                    <input type="text" class="form-control" id="nume" name="nume"
                           th:value="${driver.nume}" required>
                </div>
                <div class="mb-3">
                    <label for="teamId" class="form-label">Echipa</label>
                    <select class="form-select" id="teamId" name="teamId" required>
                        <option th:each="team : ${teams}"
                                th:value="${team.id}"
                                th:text="${team.nume}"
                                th:selected="${driver.team != null && driver.team.id == team.id}">
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="season" class="form-label">Sezon</label>
                    <select class="form-select" id="season" name="season">
                        <option value="" th:selected="${driver.season == null}">— fara sezon —</option>
                        <option th:each="y : ${seasons}" th:value="${y}" th:text="${y}"
                                th:selected="${driver.season != null && driver.season == y}"></option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label for="campionate" class="form-label">Campionate</label>
                        <input type="number" class="form-control" id="campionate" name="campionate"
                               th:value="${driver.campionate}" min="0" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="nrPuncte" class="form-label">Puncte</label>
                        <input type="number" class="form-control" id="nrPuncte" name="nrPuncte"
                               th:value="${driver.nrPuncte}" min="0" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="nrPodium" class="form-label">Podiumuri</label>
                        <input type="number" class="form-control" id="nrPodium" name="nrPodium"
                               th:value="${driver.nrPodium}" min="0" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="nrCastig" class="form-label">Castiguri</label>
                        <input type="number" class="form-control" id="nrCastig" name="nrCastig"
                               th:value="${driver.nrCastig}" min="0" required>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Salveaza</button>
                    <a th:href="@{/drivers}" class="btn btn-outline-light">Anuleaza</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
