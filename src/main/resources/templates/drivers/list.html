<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head><title>Driveri</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Driveri</h2>
        <div class="d-flex align-items-center gap-2">
            <form th:action="@{/drivers}" method="get" class="d-flex align-items-center gap-2 mb-0">
                <label class="text-muted small mb-0">Sezon:</label>
                <select name="season" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:auto" onchange="this.form.submit()">
                    <option value="0" th:selected="${selectedSeason == 0}">Toate</option>
                    <option th:each="y : ${seasons}" th:value="${y}" th:text="${y}" th:selected="${selectedSeason == y}"></option>
                </select>
            </form>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/drivers/new}" class="btn btn-danger">+ Adauga Driver</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-striped table-hover">
            <thead>
                <tr>
                    <th>Nume</th>
                    <th>Echipa</th>
                    <th>Sezon</th>
                    <th>Campionate</th>
                    <th>Puncte</th>
                    <th>Podiumuri</th>
                    <th>Castiguri</th>
                    <th sec:authorize="hasRole('ADMIN')">Actiuni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="driver : ${drivers}">
                    <td th:text="${driver.nume}"></td>
                    <td th:text="${driver.team.nume}"></td>
                    <td th:text="${driver.season != null ? driver.season : '-'}"></td>
                    <td th:text="${driver.campionate}"></td>
                    <td th:text="${driver.nrPuncte}"></td>
                    <td th:text="${driver.nrPodium}"></td>
                    <td th:text="${driver.nrCastig}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/drivers/{id}/edit(id=${driver.id})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/drivers/{id}/delete(id=${driver.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Stergi acest driver?')">Sterge</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
