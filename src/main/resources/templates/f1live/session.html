<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Rezultate Sesiune</title></head>
<body>
<div layout:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/f1/calendar(year=${year})}">Calendar</a></li>
            <li class="breadcrumb-item active" th:text="${data.event_name ?: 'Sesiune'}"></li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            <span th:text="${data.event_name ?: 'Sesiune'}"></span>
            <span class="badge bg-danger ms-2" th:text="${data.session_name ?: sessionType}"></span>
        </h2>
        <!-- Session type switcher -->
        <div class="btn-group">
            <a th:href="@{/f1/session(year=${year},round=${round},sessionType='R')}"
               th:classappend="${sessionType == 'R'} ? 'active'" class="btn btn-sm btn-outline-light">Cursa</a>
            <a th:href="@{/f1/session(year=${year},round=${round},sessionType='Q')}"
               th:classappend="${sessionType == 'Q'} ? 'active'" class="btn btn-sm btn-outline-light">Calificare</a>
            <a th:href="@{/f1/session(year=${year},round=${round},sessionType='FP1')}"
               th:classappend="${sessionType == 'FP1'} ? 'active'" class="btn btn-sm btn-outline-light">AL1</a>
            <a th:href="@{/f1/session(year=${year},round=${round},sessionType='FP2')}"
               th:classappend="${sessionType == 'FP2'} ? 'active'" class="btn btn-sm btn-outline-light">AL2</a>
            <a th:href="@{/f1/session(year=${year},round=${round},sessionType='FP3')}"
               th:classappend="${sessionType == 'FP3'} ? 'active'" class="btn btn-sm btn-outline-light">AL3</a>
        </div>
    </div>

    <div th:if="${data.error}" class="alert alert-danger">
        <strong>Eroare:</strong> <span th:text="${data.error}"></span>
    </div>

    <div th:if="${data.results != null}">
        <div class="d-flex gap-2 mb-3">
            <a th:href="@{/f1/fastest-laps(year=${year},round=${round})}"
               class="btn btn-sm btn-outline-danger">Ture Rapide</a>
            <a th:href="@{/f1/telemetry(year=${year},round=${round},sessionType=${sessionType})}"
               class="btn btn-sm btn-outline-info">Telemetrie</a>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>#</th>
                        <th>Driver</th>
                        <th>Echipa</th>
                        <th>Timp</th>
                        <th th:if="${sessionType == 'R'}">Puncte</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="result : ${data.results}">
                        <td>
                            <span th:if="${result.position == 1}" class="text-warning fw-bold">1</span>
                            <span th:if="${result.position == 2}" class="text-secondary fw-bold">2</span>
                            <span th:if="${result.position == 3}" style="color:#cd7f32" class="fw-bold">3</span>
                            <span th:if="${result.position > 3}" th:text="${result.position}"></span>
                        </td>
                        <td th:text="${result.driver_number}" class="text-muted"></td>
                        <td>
                            <span class="me-2" style="display:inline-block;width:4px;height:18px;border-radius:2px;vertical-align:middle;"
                                  th:style="'background-color:' + ${result.team_color} + ';display:inline-block;width:4px;height:18px;border-radius:2px;vertical-align:middle;'"></span>
                            <strong th:text="${result.abbreviation}"></strong>
                            <span th:text="${' ' + result.full_name}" class="text-muted small"></span>
                        </td>
                        <td th:text="${result.team}"></td>
                        <td th:text="${result.time}" class="font-monospace"></td>
                        <td th:if="${sessionType == 'R'}" th:text="${result.points}"></td>
                        <td th:text="${result.status}" class="text-muted small"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
