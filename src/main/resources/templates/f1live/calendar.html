<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Calendar F1</title></head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Calendar F1</h2>
        <form method="get" action="/f1/calendar" class="d-flex gap-2">
            <select name="year" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:120px">
                <option th:each="y : ${years}" th:value="${y}" th:text="${y}"
                        th:selected="${y == selectedYear}"></option>
            </select>
            <button type="submit" class="btn btn-danger btn-sm">Incarca</button>
        </form>
    </div>

    <div th:if="${data.error}" class="alert alert-danger">
        <strong>Eroare:</strong> <span th:text="${data.error}"></span>
        <div class="mt-2 small">Asigura-te ca microserviciul Python ruleaza:
            <code>cd f1-service &amp;&amp; start.bat</code>
        </div>
    </div>

    <div th:if="${data.rounds != null}">
        <p class="text-muted">Sezon <strong th:text="${selectedYear}"></strong> —
            <span th:text="${#lists.size(data.rounds)}"></span> curse</p>

        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Cursa</th>
                        <th>Locatie</th>
                        <th>Data</th>
                        <th>Format</th>
                        <th>Actiuni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="race : ${data.rounds}">
                        <td th:text="${race.round}" class="text-muted"></td>
                        <td>
                            <span th:text="${race.name}" class="fw-semibold"></span>
                            <span th:if="${race.is_sprint}" class="badge bg-warning text-dark ms-1">Sprint</span>
                        </td>
                        <td th:text="${race.location + ', ' + race.country}" class="text-muted"></td>
                        <td th:text="${race.date}"></td>
                        <td>
                            <span th:text="${race.format}" class="text-muted small"></span>
                        </td>
                        <td>
                            <a th:href="@{/f1/session(year=${selectedYear},round=${race.round},sessionType='R')}"
                               class="btn btn-sm btn-outline-light me-1">Cursa</a>
                            <a th:href="@{/f1/session(year=${selectedYear},round=${race.round},sessionType='Q')}"
                               class="btn btn-sm btn-outline-secondary me-1">Calificare</a>
                            <a th:href="@{/f1/fastest-laps(year=${selectedYear},round=${race.round})}"
                               class="btn btn-sm btn-outline-danger me-1">Ture Rapide</a>
                            <a th:href="@{/f1/telemetry(year=${selectedYear},round=${race.round},sessionType='R')}"
                               class="btn btn-sm btn-outline-info">Telemetrie</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
