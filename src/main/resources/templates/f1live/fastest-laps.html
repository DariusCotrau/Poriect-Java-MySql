<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Ture Rapide</title>
    <style>
        .chart-container { position: relative; height: 420px; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/f1/calendar(year=${year})}">Calendar</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/f1/session(year=${year},round=${round},sessionType='R')}">Cursa</a>
            </li>
            <li class="breadcrumb-item active">Ture Rapide</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>
            Ture Rapide
            <span th:if="${data['event_name'] != null}"
                  th:text="${' — ' + data['event_name']}"
                  class="text-muted fs-5"></span>
        </h2>
        <a th:href="@{/f1/telemetry(year=${year},round=${round},sessionType='R')}"
           class="btn btn-outline-info btn-sm">Telemetrie</a>
    </div>

    <div th:if="${data['error']}" class="alert alert-danger">
        <strong>Eroare:</strong> <span th:text="${data['error']}"></span>
    </div>

    <div th:if="${data['fastest_laps'] != null}" class="row">

        <!-- Table -->
        <div class="col-lg-6">
            <div class="table-responsive">
                <table class="table table-dark table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Driver</th>
                            <th>Echipa</th>
                            <th>Tur</th>
                            <th>Timp</th>
                            <th>Anvelopa</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lap : ${data['fastest_laps']}">
                            <td>
                                <span th:if="${lap['position'] == 1}" class="text-warning fw-bold">1</span>
                                <span th:if="${lap['position'] != 1}" th:text="${lap['position']}"></span>
                            </td>
                            <td>
                                <span class="me-2" style="display:inline-block;width:4px;height:18px;border-radius:2px;vertical-align:middle;"
                                      th:style="'background-color:' + ${lap['team_color']} + ';display:inline-block;width:4px;height:18px;border-radius:2px;vertical-align:middle;'"></span>
                                <strong th:text="${lap['driver']}"></strong>
                                <span th:text="${' ' + lap['full_name']}" class="text-muted small"></span>
                            </td>
                            <td th:text="${lap['team']}" class="text-muted small"></td>
                            <td th:text="${lap['lap_number']}"></td>
                            <td th:text="${lap['lap_time']}" class="font-monospace"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${lap['compound'] == 'SOFT'} ? 'bg-danger' : (${lap['compound'] == 'MEDIUM'} ? 'bg-warning text-dark' : (${lap['compound'] == 'HARD'} ? 'bg-light text-dark' : 'bg-secondary'))"
                                      th:text="${lap['compound']}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Bar chart -->
        <div class="col-lg-6">
            <div class="chart-container">
                <canvas id="fastestLapsChart"></canvas>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script th:if="${data['fastest_laps'] != null}" th:inline="javascript">
        const laps = [[${data['fastest_laps']}]];
        const minTime = Math.min(...laps.map(l => l.lap_time_seconds));

        const labels = laps.map(l => l.driver);
        const times = laps.map(l => l.lap_time_seconds);
        const colors = laps.map(l => l.team_color || '#e10600');
        const displayTimes = laps.map(l => l.lap_time);

        new Chart(document.getElementById('fastestLapsChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Timp Tur (secunde)',
                    data: times,
                    backgroundColor: colors,
                    borderWidth: 0,
                    borderRadius: 3
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => ' ' + displayTimes[ctx.dataIndex]
                        }
                    }
                },
                scales: {
                    x: {
                        min: minTime - 2,
                        ticks: { color: '#aaa', font: { size: 11 } },
                        grid: { color: '#333' }
                    },
                    y: {
                        ticks: { color: '#ccc', font: { size: 12 } },
                        grid: { color: '#333' }
                    }
                }
            }
        });
    </script>

</div>
</body>
</html>
